<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SparkMatch | Premium Video Dating</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <script src="/socket.io/socket.io.js"></script>
  <style>
    :root {
      --bg: #020617;
      --surface: #0f172a;
      --surface-glass: rgba(15, 23, 42, 0.7);
      --border: rgba(255, 255, 255, 0.08);
      --primary: #6366f1;
      --primary-glow: rgba(99, 102, 241, 0.4);
      --secondary: #ec4899;
      --secondary-glow: rgba(236, 72, 153, 0.4);
      --text: #f8fafc;
      --text-muted: #94a3b8;
      --success: #10b981;
      --danger: #ef4444;
      --font-main: 'Inter', sans-serif;
      --font-title: 'Outfit', sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background-color: var(--bg);
      color: var(--text);
      font-family: var(--font-main);
      height: 100vh;
      overflow: hidden;
      line-height: 1.5;
    }

    /* ── MESH GRADIENT BACKDROP ── */
    .bg-mesh {
      position: fixed; inset: 0; z-index: -1;
      background-color: var(--bg);
      background-image: 
        radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.15) 0px, transparent 50%),
        radial-gradient(at 100% 0%, rgba(236, 72, 153, 0.1) 0px, transparent 50%),
        radial-gradient(at 100% 100%, rgba(99, 102, 241, 0.1) 0px, transparent 50%),
        radial-gradient(at 0% 100%, rgba(236, 72, 153, 0.15) 0px, transparent 50%);
    }

    /* ── SCREENS ── */
    .screen {
      position: fixed; inset: 0;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      opacity: 0; pointer-events: none;
      transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
      padding: 2rem;
    }
    .screen.active { opacity: 1; pointer-events: all; }

    /* ── HOME SCREEN ── */
    .home-card {
      text-align: center;
      max-width: 480px;
      width: 100%;
    }
    .logo {
      font-family: var(--font-title);
      font-size: 4.5rem;
      font-weight: 800;
      letter-spacing: -0.04em;
      background: linear-gradient(135deg, #818cf8 0%, #f472b6 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 0.5rem;
      filter: drop-shadow(0 0 20px var(--primary-glow));
    }
    .tagline {
      font-size: 1.1rem;
      color: var(--text-muted);
      margin-bottom: 3rem;
      letter-spacing: 0.05em;
    }
    .input-group {
      background: var(--surface-glass);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 0.8rem;
      display: flex;
      backdrop-filter: blur(20px);
      box-shadow: 0 15px 35px -5px rgba(0, 0, 0, 0.4);
      transition: all 0.3s;
      width: 100%;
      max-width: 500px;
    }
    .input-group:focus-within { border-color: var(--primary); transform: translateY(-2px); }
    .input-group input {
      flex: 1;
      background: transparent;
      border: none;
      padding: 1.2rem 2rem;
      color: var(--text);
      font-size: 1.2rem;
      outline: none;
    }
    .btn-primary {
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 18px;
      padding: 0 2.5rem;
      font-size: 1.1rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 4px 12px var(--primary-glow);
    }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 6px 20px var(--primary-glow); filter: brightness(1.1); }
    .btn-primary:active { transform: translateY(0); }

    /* ── WAITING SCREEN ── */
    .waiting-container { text-align: center; }
    .pulse-orb {
      width: 120px; height: 120px;
      background: radial-gradient(circle, var(--primary) 0%, transparent 70%);
      border-radius: 50%;
      margin: 0 auto 2rem;
      position: relative;
      display: flex; align-items: center; justify-content: center;
      font-size: 2.5rem;
    }
    .pulse-orb::after {
      content: '';
      position: absolute; inset: -10px;
      border: 2px solid var(--primary);
      border-radius: 50%;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0% { transform: scale(1); opacity: 0.8; }
      100% { transform: scale(1.5); opacity: 0; }
    }
    .waiting-title { font-family: var(--font-title); font-size: 2rem; margin-bottom: 0.5rem; }

    /* ── PROFILE CARD ── */
    .match-card {
      background: var(--surface-glass);
      backdrop-filter: blur(20px);
      border: 1px solid var(--border);
      border-radius: 32px;
      padding: 3rem;
      width: 100%;
      max-width: 400px;
      text-align: center;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    }
    .avatar-large {
      width: 100px; height: 100px;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      border-radius: 50%;
      margin: 0 auto 1.5rem;
      display: flex; align-items: center; justify-content: center;
      font-size: 2.5rem; font-weight: 800; color: white;
      box-shadow: 0 10px 20px rgba(0,0,0,0.2);
    }
    .match-name { font-family: var(--font-title); font-size: 2.5rem; font-weight: 700; margin-bottom: 0.5rem; }
    .match-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-top: 2rem; }
    .btn-action {
      padding: 1.2rem; border-radius: 18px; border: none;
      font-weight: 700; cursor: pointer; transition: all 0.2s;
      font-size: 1.1rem;
    }
    .btn-decline { background: var(--danger); color: white; }
    .btn-decline:hover { background: #dc2626; transform: translateY(-2px); box-shadow: 0 10px 20px rgba(239, 68, 68, 0.3); }
    .btn-accept { background: var(--primary); color: white; }
    .btn-accept:hover { transform: translateY(-2px); box-shadow: 0 10px 20px var(--primary-glow); }

    /* ── CALL SCREEN ── */
    #call-screen { padding: 0; flex-direction: row; align-items: stretch; }
    .video-area {
      flex: 1;
      position: relative;
      background: #000;
      overflow: hidden;
    }
    #remote-video { width: 100%; height: 100%; object-fit: cover; }
    
    .skip-btn {
      position: absolute; top: 24px; right: 24px;
      background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 12px;
      color: white; padding: 0.8rem 1.5rem; font-weight: 600;
      display: flex; align-items: center; gap: 0.5rem;
      cursor: pointer; z-index: 40; transition: all 0.2s;
    }
    .skip-btn:hover { background: rgba(255, 255, 255, 0.2); transform: translateX(4px); }

    .local-video-container {
      position: absolute; bottom: 100px; left: 24px;
      width: 240px; aspect-ratio: 4/3;
      border-radius: 20px; overflow: hidden;
      border: 2px solid var(--border);
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      z-index: 10;
    }
    #local-video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
    
    .sidebar {
      width: 380px;
      background: var(--surface);
      border-left: 1px solid var(--border);
      display: flex; flex-direction: column;
      z-index: 20;
    }
    .sidebar-header {
      padding: 1.5rem; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
    }
    .chat-messages {
      flex: 1; overflow-y: auto; padding: 1.5rem;
      display: flex; flex-direction: column; gap: 1rem;
    }
    .msg-bubble {
      max-width: 85%; padding: 0.8rem 1rem; border-radius: 18px; font-size: 0.95rem;
    }
    .msg-me { align-self: flex-end; background: var(--primary); color: white; border-bottom-right-radius: 4px; }
    .msg-them { align-self: flex-start; background: #1e293b; color: white; border-bottom-left-radius: 4px; }
    .msg-info { font-size: 0.75rem; color: var(--text-muted); margin-bottom: 0.2rem; }
    
    .chat-input-area { padding: 1.5rem; border-top: 1px solid var(--border); }
    .chat-input-wrap {
      background: #1e293b; border-radius: 12px; display: flex; align-items: center; padding: 0.5rem;
    }
    .chat-input-wrap input {
      flex: 1; background: transparent; border: none; color: white; padding: 0.5rem 0.8rem; outline: none;
    }

    .controls-bar {
      position: absolute; bottom: 32px; left: 50%; transform: translateX(-50%);
      display: flex; gap: 1rem; padding: 0.8rem 1.8rem;
      background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(24px);
      border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 100px; z-index: 30;
      box-shadow: 0 20px 40px rgba(0,0,0,0.6);
    }
    .ctrl-btn {
      width: 52px; height: 52px; border-radius: 50%; border: none;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      background: rgba(255, 255, 255, 0.1); color: white;
    }
    .ctrl-btn svg { width: 24px; height: 24px; stroke-width: 2; }
    .ctrl-btn:hover { background: rgba(255, 255, 255, 0.15); transform: translateY(-2px); }
    
    /* Muted/Active Red State for Cam/Mic */
    .ctrl-btn.active { background: rgba(220, 38, 38, 0.2); color: #ef4444; border: 1px solid rgba(220, 38, 38, 0.3); }
    .ctrl-btn.active:hover { background: rgba(220, 38, 38, 0.3); }

    /* Speaker Boosted State (More Distinct) */
    .ctrl-btn.speaker.active { background: rgba(255, 255, 255, 0.5); color: white; border: 1px solid rgba(255, 255, 255, 0.2); box-shadow: 0 0 15px rgba(255, 255, 255, 0.1); }

    .ctrl-btn.end { background: #ef4444; color: white; }
    .ctrl-btn.end svg { fill: white; stroke: none; transform: rotate(135deg); }
    .ctrl-btn.end:hover { background: #dc2626; transform: translateY(-2px) scale(1.05) rotate(135deg); }

    /* ── UTILS ── */
    .toast {
      position: fixed; top: 2rem; right: 2rem;
      background: var(--surface); border: 1px solid var(--border);
      padding: 1rem 1.5rem; border-radius: 16px;
      transform: translateX(120%); transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      z-index: 1000; box-shadow: 0 10px 25px rgba(0,0,0,0.5);
    }
    .toast.show { transform: translateX(0); }
  </style>
</head>
<body>
<div class="bg-mesh"></div>

<!-- HOME -->
<div class="screen active" id="home">
  <div class="home-card">
    <div class="logo">SparkMatch</div>
    <div class="tagline">The premium way to meet new people</div>
    <div class="input-group">
      <input type="text" id="name-field" placeholder="What's your name?" maxlength="20" autocomplete="off" />
      <button class="btn-primary" id="btn-start">Start Matching</button>
    </div>
  </div>
</div>

<!-- WAITING -->
<div class="screen" id="waiting">
  <div class="waiting-container">
    <div class="pulse-orb">✨</div>
    <div class="waiting-title">Finding your perfect match</div>
    <p class="tagline" id="waiting-count-badge">Checking the lobby...</p>
  </div>
</div>

<!-- PROFILE -->
<div class="screen" id="profile-screen">
  <div class="match-card">
    <div class="avatar-large" id="partner-avatar">?</div>
    <div class="match-name" id="partner-name">—</div>
    <p class="tagline" style="margin-bottom: 2rem">Found someone special!</p>
    <div id="partner-status" style="font-size: 0.85rem; color: var(--success); margin-bottom: 1rem; min-height: 1.5rem"></div>
    <div class="match-actions" id="profile-actions">
      <button class="btn-action btn-accept" id="btn-accept">Accept Connection</button>
    </div>
  </div>
</div>

<!-- CALL -->
<div class="screen" id="call-screen">
  <div class="video-area">
    <video id="remote-video" autoplay playsinline></video>
    <div class="local-video-container">
      <video id="local-video" autoplay playsinline muted></video>
    </div>
    
    <button class="skip-btn" id="btn-skip-call">
      Skip Next
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>
    </button>

    <div class="controls-bar">
      <button class="ctrl-btn vid" id="btn-vid" title="Toggle Camera">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="m22 8-6 4 6 4V8Z"/><rect x="2" y="6" width="14" height="12" rx="2" ry="2"/></svg>
      </button>
      <button class="ctrl-btn mute" id="btn-mute" title="Toggle Mic">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="22"/></svg>
      </button>
      <button class="ctrl-btn speaker" id="btn-speaker" title="Boost Volume">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M11 5 6 9H2v6h4l5 4V5z"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
      </button>
      <button class="ctrl-btn end" id="btn-end" title="End Call">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 18.92z"/></svg>
      </button>
    </div>
  </div>

  <div class="sidebar">
    <div class="sidebar-header">
      <h3 id="call-name-badge">Chat</h3>
      <span style="font-size: 0.8rem; color: var(--success)">● Live</span>
    </div>
    <div class="chat-messages" id="chat-messages"></div>
    <div class="chat-input-area">
      <div class="chat-input-wrap">
        <input type="text" id="chat-input" placeholder="Type a message..." maxlength="200" />
        <button class="btn-primary" id="chat-send" style="padding: 0.5rem 1rem; border-radius: 8px; font-size: 0.8rem">Send</button>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  const socket = io();

  // State
  let myName = '';
  let partnerId = null;
  let partnerName = '';
  let localStream = null;
  let pc = null;
  let isMuted = false;
  let isCamOff = false;
  let myAccepted = false;

  const ICE_SERVERS = { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] };

  // Screens
  const screens = {
    home: document.getElementById('home'),
    waiting: document.getElementById('waiting'),
    profile: document.getElementById('profile-screen'),
    call: document.getElementById('call-screen'),
  };

  function showScreen(name) {
    Object.values(screens).forEach(s => s.classList.remove('active'));
    screens[name].classList.add('active');
  }

  function toast(msg, duration = 3000) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), duration);
  }

  // ── HOME ──
  const nameField = document.getElementById('name-field');
  const btnStart = document.getElementById('btn-start');

  nameField.addEventListener('keydown', e => { if (e.key === 'Enter') btnStart.click(); });

  btnStart.addEventListener('click', () => {
    const name = nameField.value.trim();
    if (!name) { toast('Enter your name first!'); return; }
    myName = name;
    socket.emit('join_waiting', { name });
    showScreen('waiting');
  });

  // ── WAITING ──
  socket.on('waiting_count', ({ count }) => {
    const badge = document.getElementById('waiting-count-badge');
    badge.textContent = count === 1 ? '1 person in the lobby' : `${count} people in the lobby`;
  });

  // ── PROFILE ──
  socket.on('show_profile', ({ name, partnerId: pid }) => {
    partnerId = pid;
    partnerName = name;
    myAccepted = false;

    document.getElementById('partner-name').textContent = name;
    document.getElementById('partner-avatar').textContent = name[0].toUpperCase();
    document.getElementById('partner-status').textContent = '';

    // Reset actions
    const actions = document.getElementById('profile-actions');
    actions.innerHTML = `
      <button class="btn-action btn-decline" id="btn-decline">Skip</button>
      <button class="btn-action btn-accept" id="btn-accept">Accept</button>
    `;
    document.getElementById('btn-decline').addEventListener('click', onDecline);
    document.getElementById('btn-accept').addEventListener('click', onAccept);

    showScreen('profile');
  });

  function onAccept() {
    myAccepted = true;
    document.getElementById('btn-accept').disabled = true;
    if (document.getElementById('btn-decline')) {
      document.getElementById('btn-decline').disabled = true;
    }

    const actions = document.getElementById('profile-actions');
    actions.innerHTML = `<div style="grid-column: span 2; color: var(--primary); font-weight: 600;">✓ Waiting for ${partnerName}...</div>`;

    socket.emit('accept');
  }

  function onDecline() {
    socket.emit('decline');
    showScreen('waiting');
  }

  socket.on('partner_accepted', () => {
    const status = document.getElementById('partner-status');
    status.textContent = `${partnerName} accepted! ✨`;
  });

  socket.on('partner_declined', () => {
    toast(`${partnerName} skipped. Finding new match...`);
    showScreen('waiting');
  });

  socket.on('back_to_waiting', () => {
    showScreen('waiting');
  });

  // ── CALL ──
  socket.on('start_call', async ({ initiator, partnerId: pid }) => {
    partnerId = pid;
    document.getElementById('call-name-badge').textContent = `Chat with ${partnerName}`;
    document.getElementById('chat-messages').innerHTML = '';
    showScreen('call');

    try {
      localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
      document.getElementById('local-video').srcObject = localStream;
    } catch (e) {
      toast('Camera/Mic access denied 🚫');
      console.error(e);
    }

    pc = new RTCPeerConnection(ICE_SERVERS);

    if (localStream) localStream.getTracks().forEach(t => pc.addTrack(t, localStream));

    pc.ontrack = e => {
      document.getElementById('remote-video').srcObject = e.streams[0];
    };

    pc.onicecandidate = e => {
      if (e.candidate) socket.emit('webrtc_ice', { candidate: e.candidate, to: partnerId });
    };

    if (initiator) {
      const offer = await pc.createOffer();
      await pc.setLocalDescription(offer);
      socket.emit('webrtc_offer', { offer, to: partnerId });
    }
    
    appendMsg(`You are now connected with ${partnerName}! Say hi! 👋`, 'System', false, true);
  });

  socket.on('webrtc_offer', async ({ offer, from }) => {
    if (!pc) return;
    await pc.setRemoteDescription(new RTCSessionDescription(offer));
    const answer = await pc.createAnswer();
    await pc.setLocalDescription(answer);
    socket.emit('webrtc_answer', { answer, to: from });
  });

  socket.on('webrtc_answer', async ({ answer }) => {
    if (!pc) return;
    await pc.setRemoteDescription(new RTCSessionDescription(answer));
  });

  socket.on('webrtc_ice', async ({ candidate }) => {
    if (!pc) return;
    try { await pc.addIceCandidate(new RTCIceCandidate(candidate)); } catch (e) {}
  });

  socket.on('call_ended', () => {
    endCall(false);
    toast('Call ended by partner');
    showScreen('waiting');
    socket.emit('join_waiting', { name: myName });
  });

  function endCall(notify = true) {
    if (notify && partnerId) socket.emit('end_call');
    if (pc) { pc.close(); pc = null; }
    if (localStream) { localStream.getTracks().forEach(t => t.stop()); localStream = null; }
    document.getElementById('remote-video').srcObject = null;
    document.getElementById('local-video').srcObject = null;
    partnerId = null;
  }

  // ── CONTROLS ──
  const ICONS = {
    micOn: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="22"/></svg>`,
    micOff: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><line x1="1" y1="1" x2="23" y2="23"/><path d="M9 9v3a3 3 0 0 0 5.12 2.12M15 9.34V5a3 3 0 0 0-5.94-.6"/><path d="M17 16.95A7 7 0 0 1 5 12v-2m14 0v2a7 7 0 0 1-.11 1.23"/><line x1="12" y1="19" x2="12" y2="22"/></svg>`,
    vidOn: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="m22 8-6 4 6 4V8Z"/><rect x="2" y="6" width="14" height="12" rx="2" ry="2"/></svg>`,
    vidOff: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><line x1="1" y1="1" x2="23" y2="23"/><path d="M16 11.35V8l6-4v16l-2.47-1.65"/><path d="M10.9 5.21A2 2 0 0 1 12 7v4.35s0 0 0 0"/><path d="M7 2h1v2"/><path d="M7 20h1v2"/><path d="M3 3h3.35"/></svg>`,
    speaker: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M11 5 6 9H2v6h4l5 4V5z"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>`
  };

  document.getElementById('btn-end').addEventListener('click', () => {
    endCall(true);
    showScreen('home');
  });

  document.getElementById('btn-skip-call').addEventListener('click', () => {
    if (partnerId) {
      endCall(true);
      showScreen('waiting');
      socket.emit('join_waiting', { name: myName });
    }
  });

  document.getElementById('btn-mute').addEventListener('click', () => {
    if (!localStream) return;
    isMuted = !isMuted;
    localStream.getAudioTracks().forEach(t => t.enabled = !isMuted);
    const btn = document.getElementById('btn-mute');
    btn.innerHTML = isMuted ? ICONS.micOff : ICONS.micOn;
    btn.classList.toggle('active', isMuted);
  });

  document.getElementById('btn-vid').addEventListener('click', () => {
    if (!localStream) return;
    isCamOff = !isCamOff;
    localStream.getVideoTracks().forEach(t => t.enabled = !isCamOff);
    const btn = document.getElementById('btn-vid');
    btn.innerHTML = isCamOff ? ICONS.vidOff : ICONS.vidOn;
    btn.classList.toggle('active', isCamOff);
  });

  let isBoosted = false;
  let audioCtx, gainNode, source;

  document.getElementById('btn-speaker').addEventListener('click', () => {
    isBoosted = !isBoosted;
    const btn = document.getElementById('btn-speaker');
    btn.classList.toggle('active', isBoosted);
    toast(isBoosted ? 'Volume Boosted! 🔊' : 'Normal Volume');

    const remoteVideo = document.getElementById('remote-video');
    if (!remoteVideo.srcObject) return;

    if (!audioCtx) {
      try {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        gainNode = audioCtx.createGain();
        source = audioCtx.createMediaStreamSource(remoteVideo.srcObject);
        source.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        remoteVideo.muted = true;
      } catch (e) { console.error("Audio boost error:", e); }
    }

    if (gainNode) {
      gainNode.gain.value = isBoosted ? 3.0 : 1.0;
    }
  });

  // ── CHAT ──
  const chatMessages = document.getElementById('chat-messages');
  const chatInput = document.getElementById('chat-input');

  function sendChat() {
    const msg = chatInput.value.trim();
    if (!msg || !partnerId) return;
    socket.emit('chat_message', { message: msg, to: partnerId });
    appendMsg(msg, myName, true);
    chatInput.value = '';
  }

  document.getElementById('chat-send').addEventListener('click', sendChat);
  chatInput.addEventListener('keydown', e => { if (e.key === 'Enter') sendChat(); });

  socket.on('chat_message', ({ message, name }) => {
    appendMsg(message, name, false);
  });

  function appendMsg(msg, name, isMe, isSystem = false) {
    const div = document.createElement('div');
    if (isSystem) {
      div.className = 'msg-info';
      div.style.textAlign = 'center';
      div.style.width = '100%';
      div.textContent = msg;
    } else {
      div.className = `msg-bubble ${isMe ? 'msg-me' : 'msg-them'}`;
      div.innerHTML = `<div style="font-size: 0.7rem; opacity: 0.7; margin-bottom: 2px;">${isMe ? 'You' : name}</div>${msg}`;
    }
    chatMessages.appendChild(div);
    chatMessages.scrollTop = chatMessages.scrollHeight;
  }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SparkMatch — Sign In</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/auth.css" />
</head>
<body>

<div class="ambient">
  <div class="ambient-1"></div>
  <div class="ambient-2"></div>
  <div class="ambient-3"></div>
</div>

<div class="screen active" id="auth-screen">
  <div class="auth-wrap">
    <div class="auth-header">
      <div class="logo-text">SparkMatch</div>
      <div class="subtitle tagline">Meet someone new, right now</div>
    </div>

    <div class="card auth-card">
      <form class="auth-form" id="login-form">
        <div class="input-group">
          <label class="input-label">Username</label>
          <input class="input-field" id="login-username" placeholder="your_username" autocomplete="username" required />
        </div>
        <div class="input-group">
          <label class="input-label">Password</label>
          <input class="input-field" id="login-password" type="password" placeholder="••••••••" autocomplete="current-password" required />
        </div>
        <div id="login-error" style="color:#f87171;font-size:0.85rem;min-height:1rem"></div>
        <button type="submit" class="btn btn-primary btn-full btn-lg" id="login-btn">Sign In</button>
      </form>
    </div>

    <div class="auth-footer">
      No account? <a href="signup.html">Create one free</a>
    </div>
  </div>
</div>

<div id="toast"></div>

<script type="module" src="js/auth.js"></script>
</body>
</html>
